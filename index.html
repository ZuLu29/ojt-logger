<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DICT OJT Logger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #f5f7fa;
    --white: #ffffff;
    --border: #dde3ec;
    --dict-blue: #003087;
    --dict-red: #CE1126;
    --dict-yellow: #FCD116;
    --text: #1a2340;
    --muted: #7a8499;
    --card-shadow: 0 2px 16px rgba(0,48,135,0.10);
    --login-green: #16a34a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Subtle top stripe */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--dict-blue) 0%, var(--dict-blue) 60%, var(--dict-red) 80%, var(--dict-yellow) 100%);
    z-index: 10;
  }

  .screen {
    display: none;
    width: 100%;
    max-width: 390px;
    position: relative;
    z-index: 1;
  }
  .screen.active { display: block; }

  /* ===== HEADER ===== */
  .dict-header {
    background: var(--white);
    border-radius: 20px;
    box-shadow: var(--card-shadow);
    padding: 20px 24px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid var(--border);
  }

  .dict-header img {
    width: 56px;
    height: 56px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .dict-header .titles .org {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dict-blue);
    font-weight: 600;
    opacity: 0.7;
  }

  .dict-header .titles h1 {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--dict-blue);
    line-height: 1.2;
    margin-top: 2px;
  }

  .dict-header .titles .sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ===== CARDS ===== */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    padding: 18px 20px;
    margin-bottom: 14px;
  }

  /* Time */
  .time-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .time-card .time-block .time {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--dict-blue);
    letter-spacing: -1px;
  }

  .time-card .time-block .ampm {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .time-card .date-block {
    text-align: right;
  }

  .time-card .date-block .day-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .time-card .date-block .date {
    font-size: 12px;
    color: var(--muted);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #16a34a;
    font-weight: 600;
    margin-top: 6px;
    justify-content: flex-end;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #16a34a;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* User card */
  .user-card-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .user-card-row .name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--dict-blue);
  }

  .user-card-row .email {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .edit-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  .info-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    background: #eef2fb;
    color: var(--dict-blue);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #d0daf5;
  }

  /* Buttons */
  .btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .btn-sign {
    width: 100%;
    background: linear-gradient(135deg, var(--dict-blue), #0055cc);
    color: white;
    box-shadow: 0 6px 24px rgba(0,48,135,0.25);
    border-radius: 16px;
    padding: 24px 16px;
    margin-bottom: 14px;
    font-size: 18px;
  }

  .btn {
    border: none;
    border-radius: 16px;
    padding: 10px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.5px;
  }

  .btn:active { transform: scale(0.97); }
  .btn-icon { font-size: 28px; }

  .btn-in {
    background: linear-gradient(135deg, var(--login-green), #00ff00);
    color: white;
    box-shadow: 0 6px 24px rgba(0, 135, 88, 0.25);
  }

  .btn-out {
    background: linear-gradient(135deg, var(--dict-red), #ff3355);
    color: white;
    box-shadow: 0 6px 24px rgba(206,17,38,0.22);
  }

  /* Footer */
  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding-top: 40px;
  }

  /* ===== SETUP SCREEN ===== */
  .setup-header {
    background: var(--white);
    border-radius: 20px;
    box-shadow: var(--card-shadow);
    padding: 20px 24px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid var(--border);
  }

  .setup-header img {
    width: 50px; height: 50px;
    object-fit: contain; flex-shrink: 0;
  }

  .setup-header .titles h2 {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 800;
    color: var(--dict-blue);
  }

  .setup-header .titles p {
    font-size: 12px; color: var(--muted); margin-top: 2px;
  }

  .form-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    padding: 20px;
    margin-bottom: 14px;
  }

  .form-card .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dict-blue);
    font-weight: 700;
    margin-bottom: 14px;
    opacity: 0.7;
  }

  .form-group { margin-bottom: 12px; }

  .form-group label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 600;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--dict-blue);
    background: white;
  }

  .form-group input::placeholder { color: var(--muted); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 11px;
  }

  .btn-setup {
    width: 100%;
    background: linear-gradient(135deg, var(--dict-blue), #0055cc);
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 20px rgba(0,48,135,0.25);
    transition: all 0.2s;
  }

  .btn-setup:active { transform: scale(0.98); opacity: 0.9; }

  .error-msg {
    color: var(--dict-red);
    font-size: 12px;
    margin-bottom: 10px;
    display: none;
    font-weight: 600;
  }

  /* ===== OVERLAY ===== */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(245,247,250,0.97);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 24px;
  }

  .overlay.show { display: flex; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

  .overlay-logo { width: 60px; height: 60px; object-fit: contain; margin-bottom: 4px; }
  .overlay-icon { font-size: 52px; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes popIn { from{transform:scale(0);} to{transform:scale(1);} }

  .overlay-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px; font-weight: 800;
    color: var(--dict-blue);
  }

  .overlay-sub { font-size: 13px; color: var(--muted); text-align: center; }

  .overlay-close {
    margin-top: 16px;
    background: var(--dict-blue);
    border: none;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    padding: 13px 36px;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,48,135,0.2);
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div class="screen active" id="setupScreen">
  <div class="setup-header">
    <img id="setupLogo" src="" alt="DICT Logo">
    <div class="titles">
      <h2>DICT <br> Digital Logbook</h2>
      <!-- <p>I-fill up once, one-tap na palagi!</p> -->
    </div>
  </div>

  <div class="form-card">
    <div class="section-label">Personal Info</div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="s_email" placeholder="yourname@gmail.com">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Last Name *</label>
        <input type="text" id="s_lastname" placeholder="Dela Cruz">
      </div>
      <div class="form-group">
        <label>First Name *</label>
        <input type="text" id="s_firstname" placeholder="Juan">
      </div>
    </div>

    <div class="form-group">
      <label>Middle Name</label>
      <input type="text" id="s_middlename" placeholder="Santos">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Age *</label>
        <input type="number" id="s_age" placeholder="21" min="1" max="99">
      </div>
      <div class="form-group">
        <label>Gender *</label>
        <div class="select-wrap">
          <select id="s_gender">
            <option value="">Select</option>
            <option value="Man">Man</option>
            <option value="Woman">Woman</option>
            <option value="Non-binary">Non-binary</option>
            <option value="Prefer not to say">Prefer not to say</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="form-card">
    <div class="section-label">Visit Details</div>

    <div class="form-group">
      <label>Sector *</label>
      <div class="select-wrap">
        <select id="s_sector">
          <option value="">Select sector</option>
          <option value="NGA">NGA</option>
          <option value="LGU">LGU</option>
          <option value="Women">Women</option>
          <option value="Students/SUC">Students/SUC</option>
          <option value="PWDs">PWDs</option>
          <option value="PDLs">PDLs</option>
          <option value="Indigenous People">Indigenous People</option>
          <option value="Senior Citizens">Senior Citizens</option>
          <option value="OSY">OSY</option>
          <option value="Farmers/Fisherfolk">Farmers/Fisherfolk</option>
          <option value="MSME/Entrepreneurs">MSME/Entrepreneurs</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Service Availed *</label>
      <div class="select-wrap">
        <select id="s_service">
          <option value="">Select service</option>
          <option value="Training">Training</option>
          <option value="e-Government Services">e-Government Services</option>
          <option value="Coworking">Coworking</option>
          <option value="Internet Access">Internet Access</option>
          <option value="Community Event">Community Event</option>
          <option value="Printing/Photocopying">Printing/Photocopying</option>
          <option value="Simcard Registration">Simcard Registration</option>
          <option value="Use of Equipment">Use of Equipment</option>
          <option value="Meetings">Meetings</option>
          <option value="Technical Assistance">Technical Assistance</option>
          <option value="Use of Facility">Use of Facility</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>First Time Visitor? *</label>
      <div class="select-wrap">
        <select id="s_firsttime">
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>
    </div>
  </div>

  <div class="error-msg" id="setupError">⚠️ Please fill in all required fields!</div>
  <button class="btn-setup" onclick="saveSetup()">Save & Continue →</button>
</div>

<!-- MAIN SCREEN -->
<div class="screen" id="mainScreen">
  <div class="dict-header">
    <img id="mainLogo" src="" alt="DICT Logo">
    <div class="titles">
      <!-- <div class="org">Department of ICT • Region 4B</div> -->
      <h1>DICT <br> Digital Logbook</h1>
      <!-- <div class="sub">Palawan OJT Digital Logbook</div> -->
    </div>
  </div>

  <div class="card time-card">
    <div class="time-block">
      <div class="time" id="clock">--:--</div>
      <div class="ampm" id="ampm">--</div>
    </div>
    <div class="date-block">
      <div class="day-name" id="dayName">---</div>
      <div class="date" id="dateDisplay">---</div>
      <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    </div>
  </div>

  <div class="card">
    <div class="user-card-row">
      <div>
        <div class="name" id="displayName">---</div>
        <div class="email" id="displayEmail">---</div>
      </div>
      <button class="edit-btn" onclick="editProfile()">✏️ Edit</button>
    </div>
    <div class="divider"></div>
    <div class="info-pills" id="infoPills"></div>
  </div>

  <button class="btn btn-sign" onclick="submitForm('signin')">
    <span class="btn-icon">📝</span>
    SIGN IN
  </button>

  <div class="footer-note">DICT-Palawan • Digital Logbook</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <img class="overlay-logo" id="overlayLogo" src="" alt="DICT">
  <div class="overlay-icon" id="overlayIcon">✅</div>
  <div class="overlay-title" id="overlayTitle">Logged In!</div>
  <div class="overlay-sub" id="overlaySub">Form submitted successfully</div>
  <button class="overlay-close" onclick="closeOverlay()">Done ✓</button>
</div>

  // Set logos
  document.getElementById('setupLogo').src = LOGO_SRC;
  document.getElementById('mainLogo').src = LOGO_SRC;
  document.getElementById('overlayLogo').src = LOGO_SRC;

  const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfDunh8qdHgI2C_-qr2e51A9LryAO9e1S1FgnN_vGYXBAKWLg/formResponse';

  const ENTRY = {
    email:     'entry.429500118',
    lastname:  'entry.1122302792',
    firstname: 'entry.41275576',
    middlename:'entry.1385230754',
    age:       'entry.689205534',
    sector:    'entry.776605123',

    agree:     'entry.143518111',
    firsttime: 'entry.1598388628',
    gender:    'entry.142726833',
  };

  let userData = null;

  function saveSetup() {
    const email     = document.getElementById('s_email').value.trim();
    const lastname  = document.getElementById('s_lastname').value.trim();
    const firstname = document.getElementById('s_firstname').value.trim();
    const middlename= document.getElementById('s_middlename').value.trim();
    const age       = document.getElementById('s_age').value.trim();
    const gender    = document.getElementById('s_gender').value;
    const sector    = document.getElementById('s_sector').value;
    const service   = document.getElementById('s_service').value;
    const firsttime = document.getElementById('s_firsttime').value;
    const err = document.getElementById('setupError');

    if (!email || !lastname || !firstname || !age || !gender || !sector || !service) {
      err.style.display = 'block';
      return;
    }

    err.style.display = 'none';
    userData = { email, lastname, firstname, middlename, age, gender, sector, service, firsttime };

    try { localStorage.setItem('dict_ojt_user', JSON.stringify(userData)); } catch(e) {}
    loadMain();
  }

  function loadMain() {
    if (!userData) return;
    const fullName = userData.firstname + (userData.middlename ? ' ' + userData.middlename : '') + ' ' + userData.lastname;
    document.getElementById('displayName').textContent = fullName;
    document.getElementById('displayEmail').textContent = userData.email;

    const pills = document.getElementById('infoPills');
    pills.innerHTML = '';
    [userData.sector, userData.service, 'Age ' + userData.age, userData.gender].forEach(v => {
      if(v) {
        const p = document.createElement('span');
        p.className = 'pill';
        p.textContent = v;
        pills.appendChild(p);
      }
    });

    document.getElementById('setupScreen').classList.remove('active');
    document.getElementById('mainScreen').classList.add('active');
  }

  function editProfile() {
    document.getElementById('mainScreen').classList.remove('active');
    document.getElementById('setupScreen').classList.add('active');
    if (userData) {
      document.getElementById('s_email').value = userData.email || '';
      document.getElementById('s_lastname').value = userData.lastname || '';
      document.getElementById('s_firstname').value = userData.firstname || '';
      document.getElementById('s_middlename').value = userData.middlename || '';
      document.getElementById('s_age').value = userData.age || '';
      document.getElementById('s_gender').value = userData.gender || '';
      document.getElementById('s_sector').value = userData.sector || '';
      document.getElementById('s_service').value = userData.service || '';
      document.getElementById('s_firsttime').value = userData.firsttime || 'No';
    }
  }

  function submitForm(type) {
    if (!userData) return;
    const params = new URLSearchParams({
      [ENTRY.email]:      userData.email,
      [ENTRY.lastname]:   userData.lastname,
      [ENTRY.firstname]:  userData.firstname,
      [ENTRY.middlename]: userData.middlename,
      [ENTRY.age]:        userData.age,
      [ENTRY.gender]:     userData.gender,
      [ENTRY.sector]:     userData.sector,
      [ENTRY.service]:    userData.service,
      [ENTRY.agree]:      'I agree',
      [ENTRY.firsttime]:  userData.firsttime,
    });
    window.open(FORM_URL + '?' + params.toString(), '_blank');

    const isLogin = type === 'login';
    document.getElementById('overlayIcon').textContent = isLogin ? '🟦' : '🟥';
    document.getElementById('overlayTitle').textContent = isLogin ? 'Logged In!' : 'Logged Out!';
    document.getElementById('overlaySub').textContent =
      'Submitted • ' + document.getElementById('clock').textContent + ' ' + document.getElementById('ampm').textContent;
    document.getElementById('overlay').classList.add('show');
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
  }

  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = h + ':' + m;
    document.getElementById('ampm').textContent = ampm;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('dayName').textContent = days[now.getDay()];
    document.getElementById('dateDisplay').textContent = months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  }
  updateClock();
  setInterval(updateClock, 1000);

  window.addEventListener('load', () => {
    try {
      const saved = localStorage.getItem('dict_ojt_user');
      if (saved) { userData = JSON.parse(saved); loadMain(); }
    } catch(e) {}
  });
</script>
</body>
